spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:

  data:
    redis:
      host: redis          # Important: Use service name as hostname
      port: 6379

server:
  port: 8080             # Internal port inside container
  external:
    port: 8082

#EUREKA RELATED
#spring:
  application:
    name: wallet-service          # Make sure this is NOT commented

eureka:
  instance:
    # Use hostname (Docker service name) instead of localhost for internal calls
    hostname: ${spring.application.name}     # ← Important change
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}

    # Only these two are needed for dashboard links
    home-page-url: http://localhost:${server.external.port:8080}/
    status-page-url: http://localhost:${server.external.port:8080}/actuator/info
    health-check-url: http://localhost:${server.external.port:8080}/actuator/health

  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5     # Faster refresh in Docker

# ==================== ACTUATOR & MONITORING ====================
management:
  endpoints:
    web:
      exposure:
        include: "*"               # Expose all endpoints (health, circuitbreakers, etc.)
  endpoint:
    health:
      show-details: always
    circuitbreakers:
      enabled: true
    retries:
      enabled: true

