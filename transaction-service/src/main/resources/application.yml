server:
  port: 8083    # ← This forces the service to run ONLY on port mentioned

# Optional but useful settings
Spring:
  Application:
    name: transaction-service

# If you have other configs
transaction-service:
  url: http://localhost:8083

# secret key for jwt token
jwt:
  secret: "PaymentWalletSystemStrongSecretKeyAtLeast64CharsLongAndRandomWithoutUnderScore"

#Disable default security - important
spring:
  security:
    user:
      name: ""      # Disable default user
      password: ""


#Feign Configuration
feign:
  client:
    config:
      user-service:
        connectTimeout: 5000
        readTimeout: 5000

#Wallet Service URL (used when running locally without Eureka)
wallet-service:
  url: http://localhost:8082

notification-service:
  url: http://localhost:8084

#Docker : Spring will automatically pick application-docker.yml
#spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}