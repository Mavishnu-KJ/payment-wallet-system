routes:
  # Root → Directly forward to Swagger UI (Fixed)
  - id: root
    uri: lb://user-service
    predicates:
      - Path=/
    filters:
      - RewritePath=/, /swagger-ui/index.html

  # Swagger UI + OpenAPI
  - id: swagger
    uri: lb://user-service
    predicates:
      - Path=/swagger-ui/**, /v3/api-docs/**
    filters:
      - RewritePath=/(?<segment>.*), /${segment}

  # API Routes
  - id: user-service
    uri: lb://user-service
    predicates:
      - Path=/api/users/**, /auth/**
    filters:
      - RewritePath=/api/users/(?<segment>.*), /api/users/${segment}

  - id: wallet-service
    uri: lb://wallet-service
    predicates:
      - Path=/api/wallets/**
    filters:
      - RewritePath=/api/wallets/(?<segment>.*), /api/wallets/${segment}

  - id: transaction-service
    uri: lb://transaction-service
    predicates:
      - Path=/api/transactions/**, /api/transfer/**
    filters:
      - RewritePath=/(?<segment>.*), /${segment}

  - id: notification-service
    uri: lb://notification-service
    predicates:
      - Path=/api/notifications/**
    filters:
      - RewritePath=/(?<segment>.*), /${segment}